name: Run Optimizer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"   # ✅ เดือนละครั้ง (วันที่ 1)

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run optimizer
        run: |
          python optimizer.py

      - name: Commit optimized params
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add optimized_params.json
          git commit -m "update optimized params" || echo "no changes"
          git push
